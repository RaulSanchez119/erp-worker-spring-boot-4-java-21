spring:
  application:
    name: erp-worker

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${JPA_SHOW_SQL:true}
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: ${HIBERNATE_FORMAT_SQL:true}
        use_sql_comments: ${HIBERNATE_SHOW_COMMENTS:true}

  main:
    allow-bean-definition-overriding: true

  batch:
    job:
      enabled: true

  # MongoDB - Spring Boot 4.x
  mongodb:
    host: localhost
    port: 27017
    username: raulsanchez
    password: secret
    authentication-database: admin
    database: erp_catalog_db

  data:
    redis:
      host: localhost
      port: 6379
      password: secret
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  h2:
    console:
      enabled: true

  rabbitmq:
    host: localhost
    port: 5672
    username: raulsanchez
    password: secret
    virtual-host: /

server:
  port: 9091

logging:
  level:
    org.springframework.data: ${LOG_LEVEL_DATA:DEBUG}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:DEBUG}
    org.hibernate.type.descriptor.sql.BasicBinder: ${LOG_LEVEL_SQL_PARAMS:TRACE}
    org.mongodb.driver: ${LOG_LEVEL_MONGO:DEBUG}
